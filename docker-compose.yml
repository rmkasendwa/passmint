name: passmint

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-passmint}
      POSTGRES_USER: ${POSTGRES_USER:-passmint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-passmint}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-passmint} -d ${POSTGRES_DB:-passmint}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: passmint-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://passmint:passmint@postgres:5432/passmint}
      PORT: ${API_PORT:-3000}
      CORS_ORIGIN: http://localhost:${WEB_PORT:-8088}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: passmint-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8088}:80"
    depends_on:
      - api

volumes:
  postgres-data:
